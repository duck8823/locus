name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-unit:
    name: Lint / Typecheck / Unit / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security sanity checks
        run: npm run security:sanity

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-typecheck-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  dogfooding-metrics:
    name: Dogfooding Metrics Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate dogfooding metrics artifacts
        run: |
          npm run dogfood:metrics:artifact -- \
            --jobs-file scripts/fixtures/dogfooding-metrics/ci-jobs.json \
            --json-out artifacts/dogfooding-metrics.json \
            --markdown-out artifacts/dogfooding-metrics-summary.md \
            --max-failure-rate-percent 70 \
            --max-average-duration-ms 5000 \
            --min-recovery-success-rate-percent 30

      - name: Upload dogfooding metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogfooding-metrics
          path: artifacts/dogfooding-metrics*
          if-no-files-found: error

  ai-suggestion-quality:
    name: AI Suggestion Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Evaluate AI suggestion quality fixtures
        run: |
          npm run ai:suggest:evaluate:artifact -- \
            --fixtures-file scripts/fixtures/ai-suggestion-evaluation/sample-fixtures.json \
            --json-out artifacts/ai-suggestion-evaluation.json \
            --markdown-out artifacts/ai-suggestion-evaluation-summary.md \
            --min-useful-rate-percent 80 \
            --max-false-positive-rate-percent 20

      - name: Upload AI suggestion evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-suggestion-evaluation
          path: artifacts/ai-suggestion-evaluation*
          if-no-files-found: error

  preview-deploy:
    name: Preview Deploy (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-unit
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true

  migration-dry-run:
    name: Migration Dry-Run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-unit
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: locus_ci
          POSTGRES_PASSWORD: locus_ci_password
          POSTGRES_DB: locus_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U locus_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migration dry-run
        env:
          DATABASE_URL: postgres://locus_ci:locus_ci_password@localhost:5432/locus_ci
        run: node scripts/migration-dry-run.mjs

      - name: Verify migration applies cleanly
        env:
          DATABASE_URL: postgres://locus_ci:locus_ci_password@localhost:5432/locus_ci
        run: node scripts/migration-apply-verify.mjs
